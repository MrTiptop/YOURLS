<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 120" width="450" height="120">
  <!-- UNI text in black -->
  <text x="0" y="85" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#000000">UNI</text>
  
  <!-- Chain link icon in Unibas Mint Green - single interlocking design -->
  <g transform="translate(150, 25)">
    <!-- Single interlocking chain link - two rounded rectangles -->
    <!-- Left rounded rectangle -->
    <path d="M 0 20
             A 10 10 0 0 1 0 0
             L 25 0
             A 10 10 0 0 1 25 20
             L 25 30
             L 35 30
             L 35 20
             A 10 10 0 0 1 35 0
             L 60 0
             A 10 10 0 0 1 60 20
             L 60 50
             A 10 10 0 0 1 60 70
             L 35 70
             A 10 10 0 0 1 35 50
             L 35 40
             L 25 40
             L 25 50
             A 10 10 0 0 1 25 70
             L 0 70
             A 10 10 0 0 1 0 50
             Z" 
          fill="#A5D7D2" 
          stroke="none"/>
  </g>
  
  <!-- LINKS text in Unibas Mint Green (same color as chain link) -->
  <text x="260" y="85" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#A5D7D2">LINKS</text>
</svg>
